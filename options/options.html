<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PageTweaker Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>PageTweaker Settings</h1>

    <div class="tabs">
      <button class="tab active" data-tab="settings">Settings</button>
      <button class="tab" data-tab="rules">Rules</button>
    </div>

    <div id="settings-panel" class="panel">
      <div class="form-group">
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="ollama">Ollama (local)</option>
          <option value="openai">OpenAI</option>
          <option value="openrouter">OpenRouter</option>
          <option value="anthropic">Anthropic</option>
        </select>
      </div>

      <div class="form-group">
        <label for="base-url">Base URL</label>
        <input id="base-url" type="text" placeholder="http://localhost:11434/v1">
      </div>

      <div class="form-group" id="api-key-group">
        <label for="api-key">API Key</label>
        <input id="api-key" type="password" placeholder="Enter your API key">
      </div>

      <div class="form-group">
        <label for="model">Model</label>
        <input id="model" type="text" placeholder="llama3.2-vision">
      </div>

      <div class="form-actions">
        <button id="save-settings" class="btn primary">Save Settings</button>
        <button id="test-connection" class="btn">Test Connection</button>
      </div>

      <div id="test-result" class="test-result hidden"></div>
    </div>

    <div id="rules-panel" class="panel hidden">
      <div class="rules-actions">
        <button id="export-rules" class="btn">Export Rules</button>
        <label class="btn" for="import-rules-file">Import Rules</label>
        <input id="import-rules-file" type="file" accept=".json" class="hidden">
      </div>

      <table id="rules-table" class="rules-table">
        <thead>
          <tr>
            <th>Enabled</th>
            <th>URL Pattern</th>
            <th>CSS</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="rules-body">
        </tbody>
      </table>

      <p id="no-rules" class="no-rules">No saved rules yet. Use the side panel to create CSS rules.</p>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
