<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PageTweaker</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>PageTweaker</h1>
      <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
    </header>

    <div id="messages" class="messages"></div>

    <div id="save-bar" class="save-bar hidden">
      <input id="save-pattern" type="text" placeholder="URL pattern" class="save-input">
      <button id="save-confirm" class="save-btn">Save Rule</button>
      <button id="save-cancel" class="save-cancel-btn">Cancel</button>
    </div>

    <div class="input-area">
      <textarea id="user-input" placeholder="Describe the change you want..." rows="2"></textarea>
      <div class="input-actions">
        <button id="save-rule-btn" class="action-btn" title="Save current CSS as a rule" disabled>Save Rule</button>
        <button id="send-btn" class="action-btn primary">Send</button>
      </div>
    </div>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
